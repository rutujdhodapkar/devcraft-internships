name: Email Service Daily Cron

on:
  schedule:
    - cron: '50 8 * * *'    # 2:20 PM IST (UTC+5:30 → 08:50 UTC)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — log only, no emails sent'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: email-service
  cancel-in-progress: false

jobs:
  email-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: email-service/package-lock.json

      - name: Install dependencies
        working-directory: email-service
        run: npm ci --omit=dev

      - name: Debug
        run: |
          echo "Brevo: ${{ secrets.BREVO_API_KEY != '' && 'yes' || 'no' }}"
          echo "Dry run: ${{ github.event.inputs.dry_run || 'false' }}"

      - name: Run automation
        working-directory: email-service
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FROM_NAME: ${{ secrets.FROM_NAME }}
          RTDB_URL: ${{ secrets.RTDB_URL || 'https://laptop-privacy-default-rtdb.firebaseio.com' }}
          DOMAIN: ${{ secrets.DOMAIN || 'https://devcraft.rutujdhodapkar.tech' }}
          APPROVER_EMAIL: ${{ secrets.APPROVER_EMAIL || 'rutujdhodapkar@gmail.com' }}
          BREVO_DAILY_LIMIT: ${{ secrets.BREVO_DAILY_LIMIT || '300' }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          BREVO_PER_MINUTE_LIMIT: '20'
          WORKER_BATCH_SIZE: '50'
          WORKER_MAX_RETRIES: '5'
          PROMO_INTERVAL_DAYS: '3'
          PAYMENT_REMINDER_INTERVAL_DAYS: '2'
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node src/index.js

      - name: Report
        if: always()
        run: |
          echo "::notice::Email automation completed at $(date -u)"

      - name: Alert on failure
        if: failure()
        run: |
          echo "::error::Email automation FAILED at $(date -u)"
