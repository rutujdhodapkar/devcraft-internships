name: Email Service Daily Cron

on:
  schedule:
    # 2:00 PM IST = 8:30 UTC
    - cron: '30 8 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — log only, no emails sent'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: email-service
  cancel-in-progress: false

jobs:
  email-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: email-service/package-lock.json

      - name: Install dependencies
        working-directory: email-service
        run: npm ci --omit=dev

      - name: Debug — check env
        run: |
          echo "Brevo configured: ${{ secrets.BREVO_API_KEY != '' && 'yes' || 'no' }}"
          echo "SA key set: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY != '' && 'yes' || 'no' }}"
          echo "Dry run: ${{ github.event.inputs.dry_run || 'false' }}"

      - name: Run email automation
        working-directory: email-service
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FROM_NAME: ${{ secrets.FROM_NAME }}
          RTDB_URL: ${{ secrets.RTDB_URL }}
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          DOMAIN: ${{ secrets.DOMAIN }}
          WORKER_BATCH_SIZE: 50
          WORKER_MAX_RETRIES: 3
          PROMO_INTERVAL_DAYS: 3
          PAYMENT_REMINDER_INTERVAL_DAYS: 2
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "=== DRY RUN — no emails will be sent ==="
          fi
          node src/index.js

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Email automation failed at $(date -u)"
